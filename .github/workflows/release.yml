name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libssl-dev \
            pkg-config autoconf automake
      - name: dist tarball
        run: |
          autoreconf -fi
          ./configure
          make dist
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" vp-*.tar.gz \
            --title "vp ${GITHUB_REF_NAME#v}" --generate-notes
