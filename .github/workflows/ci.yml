name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # the zero-warning state is a gate, not an aspiration
  WFLAGS: >-
    -O2 -Wall -Wextra -Wshadow -Wstrict-prototypes -Wmissing-prototypes
    -Wpointer-arith -Wcast-qual -Wwrite-strings -Wvla -Wformat=2
    -Wnull-dereference -Wdouble-promotion -Werror

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cc: gcc,   build: cmake,     ssl: on }
          - { cc: clang, build: cmake,     ssl: on }
          - { cc: gcc,   build: autotools, ssl: on }
          - { cc: clang, build: autotools, ssl: on }
          - { cc: gcc,   build: cmake,     ssl: off }
          - { cc: clang, build: autotools, ssl: off }
    name: linux ${{ matrix.cc }} ${{ matrix.build }} ssl=${{ matrix.ssl }}
    steps:
      - uses: actions/checkout@v5
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libssl-dev \
            pkg-config autoconf automake
      - name: build (cmake)
        if: matrix.build == 'cmake'
        env:
          CC: ${{ matrix.cc }}
        run: |
          CFLAGS="$WFLAGS" cmake -B build \
            -DWITH_SSL=${{ matrix.ssl == 'on' && 'ON' || 'OFF' }} .
          cmake --build build
          echo "VP_BIN=build/src/vp" >> "$GITHUB_ENV"
      - name: build (autotools)
        if: matrix.build == 'autotools'
        env:
          CC: ${{ matrix.cc }}
        # configure runs with clean CFLAGS: -Werror + -Wstrict-prototypes
        # breaks autoconf's conftest programs and silently mis-detects
        # mkstemps/getopt_long. Warnings are injected at make time instead
        # (DEFS carries -DHAVE_CONFIG_H; SDL cflags re-added by hand since
        # overriding CFLAGS drops what configure put there).
        run: |
          autoreconf -fi
          mkdir build-ac && cd build-ac
          ../configure ${{ matrix.ssl == 'off' && '--without-ssl' || '' }}
          make CFLAGS="$WFLAGS $(pkg-config --cflags sdl2 SDL2_image)"
          echo "VP_BIN=build-ac/src/vp" >> "$GITHUB_ENV"
      - name: ssl support matches the matrix
        run: |
          set -x
          if [ "${{ matrix.ssl }}" = on ]; then
            grep -q '#define HAVE_OPENSSL' build*/config.h
          else
            ! grep -q '^#define HAVE_OPENSSL' build*/config.h
          fi
      - name: network tests
        run: sh tests/net-tests.sh "$VP_BIN"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libssl-dev \
            pkg-config clang clang-tidy clang-tools
      - name: configure
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON .
      - name: gcc -fanalyzer
        run: |
          for f in src/*.c; do
            gcc -std=gnu11 -DHAVE_CONFIG_H -Ibuild \
              $(pkg-config --cflags sdl2 SDL2_image) \
              $WFLAGS -fanalyzer -c -o /dev/null "$f"
          done
      - name: clang-tidy
        run: |
          clang-tidy -p build --warnings-as-errors='*' --checks='bugprone-*,cert-*,clang-analyzer-*,concurrency-*,performance-*,-clang-diagnostic-*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling,-bugprone-assignment-in-if-condition,-cert-err33-c,-cert-err34-c,-bugprone-easily-swappable-parameters,-bugprone-switch-missing-default-case,-concurrency-mt-unsafe' \
            src/*.c
      - name: scan-build
        run: |
          rm -rf build && cmake -B build .
          scan-build --status-bugs cmake --build build

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: deps
        run: brew install sdl2 sdl2_image
      - name: build
        run: |
          export OPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"
          CFLAGS="$WFLAGS" cmake -B build .
          cmake --build build
      - name: network tests
        run: sh tests/net-tests.sh build/src/vp

  freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: build and test in a FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          prepare: |
            pkg install -y cmake pkgconf sdl2 sdl2_image python3
          run: |
            CFLAGS="-O2 -Wall -Wextra -Wshadow -Wstrict-prototypes -Wmissing-prototypes -Wpointer-arith -Wcast-qual -Wwrite-strings -Wvla -Wformat=2 -Wnull-dereference -Wdouble-promotion -Werror" cmake -B build .
            cmake --build build
            sh tests/net-tests.sh build/src/vp
